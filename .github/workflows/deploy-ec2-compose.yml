name: Deploy to EC2 with Docker Compose

on:
    workflow_dispatch:
    push:
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Login to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: ghcr.io/${{ github.repository }}:latest

            - name: Deploy on EC2 host
              uses: appleboy/ssh-action@v1.2.0
              env:
                  GHCR_IMAGE: ghcr.io/${{ github.repository }}:latest
              with:
                  host: ${{ secrets.EC2_HOST }}
                  username: ${{ secrets.EC2_USER }}
                  key: ${{ secrets.EC2_SSH_KEY }}
                  envs: GHCR_IMAGE
                  script: |
                      set -e

                      run_step() {
                        echo "[STEP] $1"
                        shift
                        "$@"
                      }
                      APP_DIR="${{ secrets.EC2_APP_DIR }}"

                      if [ ! -d "$APP_DIR" ]; then
                        mkdir -p "$APP_DIR" 2>/dev/null || {
                          sudo mkdir -p "$APP_DIR"
                          sudo chown -R "$USER":"$USER" "$APP_DIR"
                        }
                      fi

                      cd "$APP_DIR"

                      DOCKER="docker"
                      if ! docker info >/dev/null 2>&1; then
                        DOCKER="sudo docker"
                      fi

                      echo "Using DOCKER command: $DOCKER"

                      if ! command -v git >/dev/null 2>&1; then
                        echo "git not found, installing..."
                        if command -v apt-get >/dev/null 2>&1; then
                          sudo apt-get update -y
                          sudo apt-get install -y git
                        elif command -v dnf >/dev/null 2>&1; then
                          sudo dnf install -y git
                        elif command -v yum >/dev/null 2>&1; then
                          sudo yum install -y git
                        elif command -v apk >/dev/null 2>&1; then
                          sudo apk add --no-cache git
                        else
                          echo "Unable to install git automatically. Install git on the EC2 host and retry."
                          exit 1
                        fi
                      fi

                      if ! command -v docker >/dev/null 2>&1; then
                        echo "docker not found, installing..."
                        if command -v apt-get >/dev/null 2>&1; then
                          sudo apt-get update -y
                          sudo apt-get install -y docker.io docker-compose-plugin
                        elif command -v dnf >/dev/null 2>&1; then
                          sudo dnf install -y docker docker-compose-plugin
                        elif command -v yum >/dev/null 2>&1; then
                          sudo yum install -y docker docker-compose-plugin
                        else
                          echo "Unable to install docker automatically. Install docker on the EC2 host and retry."
                          exit 1
                        fi
                        sudo systemctl enable --now docker || true
                      fi

                      if ! $DOCKER info >/dev/null 2>&1; then
                        echo "Docker daemon unavailable."
                        sudo systemctl status docker --no-pager || true
                        sudo journalctl -u docker --no-pager -n 100 || true
                        exit 1
                      fi

                      if $DOCKER compose version >/dev/null 2>&1; then
                        compose() { $DOCKER compose "$@"; }
                      elif command -v docker-compose >/dev/null 2>&1; then
                        if docker-compose version >/dev/null 2>&1; then
                          compose() { docker-compose "$@"; }
                        else
                          compose() { sudo docker-compose "$@"; }
                        fi
                      else
                        echo "docker compose not found, installing standalone docker-compose..."
                        ARCH="$(uname -m)"
                        case "$ARCH" in
                          x86_64) COMPOSE_ARCH="x86_64" ;;
                          aarch64|arm64) COMPOSE_ARCH="aarch64" ;;
                          *)
                            echo "Unsupported architecture for docker-compose install: $ARCH"
                            exit 1
                            ;;
                        esac

                        sudo curl -fsSL "https://github.com/docker/compose/releases/download/v2.29.7/docker-compose-linux-${COMPOSE_ARCH}" -o /usr/local/bin/docker-compose
                        sudo chmod +x /usr/local/bin/docker-compose
                        compose() { sudo docker-compose "$@"; }
                      fi

                      run_step "docker version" $DOCKER version
                      echo "[STEP] docker compose version"
                      compose version

                      if [ ! -d .git ]; then
                        git clone https://github.com/${{ github.repository }} .
                      fi

                      git fetch origin main
                      git checkout main
                      git reset --hard origin/main

                      cat > .env << 'EOF'
                      ${{ secrets.ENV_FILE }}
                      EOF

                      if [ -z "${GHCR_IMAGE:-}" ]; then
                        echo "GHCR_IMAGE is empty. Check workflow env propagation."
                        exit 1
                      fi

                      {
                        echo "GHCR_IMAGE=${GHCR_IMAGE}"
                        echo "EC2_MONGODB_URI=${{ secrets.EC2_MONGODB_URI }}"
                        echo "EC2_MONGODB_DB_NAME=${{ secrets.EC2_MONGODB_DB_NAME }}"
                      } > .deploy.env
                      echo "[INFO] GHCR_IMAGE=${GHCR_IMAGE}"
                      run_step "docker login ghcr.io" $DOCKER login ghcr.io -u ${{ secrets.GHCR_USERNAME }} -p ${{ secrets.GHCR_TOKEN }}

                      echo "[STEP] docker compose config"
                      if ! compose --env-file .deploy.env -f docker-compose.ec2.yml config >/dev/null; then
                        echo "docker compose config failed"
                        exit 1
                      fi

                      echo "[STEP] docker compose pull"
                      if ! compose --env-file .deploy.env -f docker-compose.ec2.yml pull; then
                        echo "docker compose pull failed"
                        compose --env-file .deploy.env -f docker-compose.ec2.yml ps || true
                        compose --env-file .deploy.env -f docker-compose.ec2.yml logs --tail=200 || true
                        sudo journalctl -u docker --no-pager -n 100 || true
                        exit 1
                      fi

                      echo "[STEP] docker compose up"
                      if ! compose --env-file .deploy.env -f docker-compose.ec2.yml up -d --remove-orphans; then
                        echo "docker compose up failed"
                        compose --env-file .deploy.env -f docker-compose.ec2.yml ps || true
                        compose --env-file .deploy.env -f docker-compose.ec2.yml logs --tail=200 || true
                        sudo journalctl -u docker --no-pager -n 100 || true
                        exit 1
                      fi

                      HEALTH_URL="http://localhost/api/health"
                      ATTEMPTS=30
                      SLEEP_SECONDS=5

                      for i in $(seq 1 "$ATTEMPTS"); do
                        if curl -fsS "$HEALTH_URL" > /dev/null; then
                          echo "Health check passed on attempt $i/$ATTEMPTS"
                          break
                        fi

                        if [ "$i" -eq "$ATTEMPTS" ]; then
                          echo "Health check failed after $ATTEMPTS attempts"
                          compose --env-file .deploy.env -f docker-compose.ec2.yml ps
                          compose --env-file .deploy.env -f docker-compose.ec2.yml logs --tail=200 api
                          exit 1
                        fi

                        echo "Waiting for API health check ($i/$ATTEMPTS)..."
                        sleep "$SLEEP_SECONDS"
                      done

                      $DOCKER image prune -f
