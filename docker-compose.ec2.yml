version: '3.9'

services:
    api:
        image: ${GHCR_IMAGE:-snack-builder-bakery-api-api:latest}
        container_name: bakery-api
        ports:
            - '80:3000'
        env_file:
            - .env
        environment:
            MONGODB_URI: ${EC2_MONGODB_URI:-mongodb://mongo:27017}
            MONGODB_DB_NAME: ${EC2_MONGODB_DB_NAME:-bakery}
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--spider',
                    '-q',
                    'http://localhost:3000/api/health',
                ]
            interval: 15s
            timeout: 5s
            retries: 5
            start_period: 20s
        depends_on:
            mongo:
                condition: service_healthy
        restart: unless-stopped

    mongo:
        image: mongo:7
        container_name: bakery-mongo
        volumes:
            - mongo_data:/data/db
        healthcheck:
            test: ['CMD', 'mongosh', '--eval', 'db.runCommand({ ping: 1 })']
            interval: 10s
            timeout: 5s
            retries: 10
        restart: unless-stopped

    prometheus:
        image: prom/prometheus:v2.54.1
        container_name: bakery-prometheus
        ports:
            - '9090:9090'
        volumes:
            - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        depends_on:
            api:
                condition: service_healthy
        restart: unless-stopped

    grafana:
        image: grafana/grafana:11.2.2
        container_name: bakery-grafana
        ports:
            - '3001:3000'
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
        volumes:
            - grafana_data:/var/lib/grafana
        depends_on:
            - prometheus
        restart: unless-stopped

volumes:
    mongo_data:
    grafana_data:
